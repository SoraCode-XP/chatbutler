version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbutler-postgres
    environment:
      POSTGRES_USER: chatbutler
      POSTGRES_PASSWORD: chatbutler123
      POSTGRES_DB: chatbutler
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatbutler']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbutler-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
